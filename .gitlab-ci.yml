stages:
  - build-db
  - deploy

variables:
  DOCKER_TLS_CERTDIR: "/certs"

build-database-image:
  stage: build-db
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE/supabase-db:latest -f database/Dockerfile database/
    - docker push $CI_REGISTRY_IMAGE/supabase-db:latest
  only:
    - main

pages:
  stage: deploy
  image: node:20-alpine
  script:
    - cd 'app version 2/client'
    - npm install
    - npm run build
    - cd ../..
    - rm -rf public
    - mv 'app version 2/client/dist' public
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
  only:
    - main


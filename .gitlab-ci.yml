stages:
  - deploy

image: node:20-alpine

pages:
  stage: deploy
  script:
    - cd 'app version 2/client'
    - npm install
    - npm run build
    - cd ../..
    - rm -rf public
    - mv 'app version 2/client/dist' public
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
  only:
    - main
